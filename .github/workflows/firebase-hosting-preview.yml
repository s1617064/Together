name: Preview Firebase Hosting

on:
  pull_request:
    paths:
      - "prototype/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOGETHER_B80A9 }}"
          projectId: together-b80a9
          expires: 7d
