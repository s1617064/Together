name: Deploy To Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "prototype/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-live.yml"

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOGETHER_B80A9 }}"
          projectId: together-b80a9
          channelId: live
